name: Run Jupyter Notebook

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install notebook nbconvert

      - name: Run notebook conversion
        run: |
          jupyter nbconvert --to html --TemplateExporter.exclude_output=True pedestrian_detection.ipynb.ipynb
